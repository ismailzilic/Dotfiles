set -a terminal-features "screen-256color:RGB"
set -g prefix M-Space
set -g base-index 1
set -g renumber-windows on
set -g mode-keys vi

set -g status-position top
set -g status-justify absolute-centre
set -g status-interval 1
set -g status-style "bg=default"
set -g window-status-current-style "fg=blue bg=default bold"
set -g status-right "%H:%M:%S #[fg=green][tmux]"
set -g status-left-length 50
set -g status-left "#[fg=default]current session: #[fg=blue bold]#S"

# Pane navigation
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R
bind -r m resize-pane -Z

# Scripts
bind r source-file ~/Dotfiles/.config/tmux/tmux.conf
bind G neww -n "lazygit" lazygit
